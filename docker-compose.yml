services:
  mysql:
    image: mysql:8.0
    container_name: poskrupuk-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: pos_krupuk
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: poskrupuk
      MYSQL_PASSWORD: poskrupuk
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: poskrupuk-app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      APP_ENV: production
      APP_DEBUG: false
      APP_KEY: base64:Vcaqo+yTWqN/C+Njv4SbIvndrfv6NrRmG2un5Lys17w=
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: pos_krupuk
      DB_USERNAME: poskrupuk
      DB_PASSWORD: poskrupuk
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      CACHE_STORE: database
    command: php artisan serve --host=0.0.0.0 --port=80
    volumes:
      - storage_data:/app/storage
    depends_on:
      mysql:
        condition: service_healthy

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: poskrupuk-queue
    restart: unless-stopped
    command: php artisan queue:listen --tries=1 --timeout=0
    environment:
      APP_ENV: production
      APP_DEBUG: false
      APP_KEY: base64:Vcaqo+yTWqN/C+Njv4SbIvndrfv6NrRmG2un5Lys17w=
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: pos_krupuk
      DB_USERNAME: poskrupuk
      DB_PASSWORD: poskrupuk
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      CACHE_STORE: database
    volumes:
      - storage_data:/app/storage
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
  storage_data:
